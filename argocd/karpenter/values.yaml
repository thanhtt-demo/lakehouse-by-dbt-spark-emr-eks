# ---------------------------------------------------------------------------------------------------------------------
# KARPENTER VALUES
# Configuration for the official Karpenter Helm chart (passed to dependency).
# clusterName, clusterEndpoint, and interruptionQueue come from Terraform outputs.
# NodePool and EC2NodeClass CRDs are hardcoded in templates/ — not driven by values.
# ---------------------------------------------------------------------------------------------------------------------

karpenter:
  # Run Karpenter controller on system managed node group
  nodeSelector:
    karpenter.sh/controller: "true"

  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists

  # Karpenter settings — populated from Terraform outputs
  settings:
    clusterName: "lakehouse-at-scale-eks"
    clusterEndpoint: "https://7B706AEA51313E1223838A185B21FC1A.gr7.ap-southeast-1.eks.amazonaws.com"
    interruptionQueue: "Karpenter-lakehouse-at-scale-eks"

  # Service account — IAM role created by Terraform (task 2.3)
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::560503716668:role/KarpenterController-20260508234614633000000006"

  # Controller resources
  controller:
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  # Replicas — 1 for non-prod (2 nodes not enough for anti-affinity with replicas: 2)
  replicas: 1
