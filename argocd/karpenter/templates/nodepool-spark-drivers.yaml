# ---------------------------------------------------------------------------------------------------------------------
# NODEPOOL: SPARK DRIVERS
# Provisions On-Demand instances for Spark driver pods.
# No taint — driver pods schedule here alongside other workloads if needed.
# Instance types: m5.large, m6i.large for stable, predictable driver performance.
# consolidateAfter: 120s — terminate idle nodes after 2 minutes.
# ---------------------------------------------------------------------------------------------------------------------

apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: spark-drivers
spec:
  template:
    metadata:
      labels:
        spark-role: driver
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: spark-drivers
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - m5.large
            - m6i.large
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 120s
  limits:
    cpu: "100"
    memory: 200Gi
---
# ---------------------------------------------------------------------------------------------------------------------
# EC2NODECLASS: SPARK DRIVERS
# Defines EC2 launch configuration for driver nodes.
# AL2023 AMI, discovers subnets and security groups via karpenter.sh/discovery tag.
# ---------------------------------------------------------------------------------------------------------------------

apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: spark-drivers
spec:
  role: "lakehouse-at-scale-karpenter-node"
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "lakehouse-at-scale-eks"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "lakehouse-at-scale-eks"
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        deleteOnTermination: true
