# ---------------------------------------------------------------------------------------------------------------------
# NODEPOOL: WORKLOAD
# Provisions On-Demand instances for application workloads (Dagster, ArgoCD, etc.).
# No taint — general-purpose workload nodes managed by Karpenter.
# Instance types: t3.medium, t3.large, m5.large for cost-effective workloads.
# consolidateAfter: 300s — terminate idle nodes after 5 minutes.
# ---------------------------------------------------------------------------------------------------------------------

apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: workload
spec:
  template:
    metadata:
      labels:
        role: workload
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: workload
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - t3.medium
            - t3.large
            - m5.large
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 300s
  limits:
    cpu: "100"
    memory: 200Gi
---
# ---------------------------------------------------------------------------------------------------------------------
# EC2NODECLASS: WORKLOAD
# Defines EC2 launch configuration for workload nodes.
# AL2023 AMI, discovers subnets and security groups via karpenter.sh/discovery tag.
# ---------------------------------------------------------------------------------------------------------------------

apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: workload
spec:
  role: "lakehouse-at-scale-karpenter-node"
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "lakehouse-at-scale-eks"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "lakehouse-at-scale-eks"
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        deleteOnTermination: true
