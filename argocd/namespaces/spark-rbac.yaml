# ---------------------------------------------------------------------------------------------------------------------
# SPARK RBAC — eks_client mode (Spark on EKS, no EMR)
# Deployed by ArgoCD at sync-wave 1.
#
# In eks_client mode the Dagster step pod IS the Spark driver (client deploy mode). It runs in
# the `dagster` namespace as the `dagster-user-deployments` SA and launches executor pods in the
# SAME namespace (Spark uses one namespace for both executor creation and driver-pod lookup).
# This grants that SA the pod/configmap/service lifecycle Spark needs to manage executors.
#
# AWS creds (S3 + Glue) come from the de-team IRSA already attached to dagster-user-deployments —
# no separate SA needed (one role for driver + executors). The `spark` namespace remains for the
# EMR-on-EKS path only.
# ---------------------------------------------------------------------------------------------------------------------

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-driver
  namespace: dagster
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: dbt-lakehouse
rules:
  # Spark looks up the driver pod (the step pod) and creates/manages executor pods here.
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/status"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection"]
  # Spark cleans up executor configmaps/services on SparkContext stop via deletecollection
  # (deleteAll by label selector) — without it the driver logs Forbidden errors at shutdown
  # and leaves orphaned resources.
  - apiGroups: [""]
    resources: ["configmaps", "services"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-driver
  namespace: dagster
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: dbt-lakehouse
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spark-driver
subjects:
  - kind: ServiceAccount
    name: dagster-user-deployments
    namespace: dagster
