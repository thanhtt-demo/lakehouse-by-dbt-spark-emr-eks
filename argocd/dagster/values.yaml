# ---------------------------------------------------------------------------------------------------------------------
# DAGSTER VALUES
# Configuration for the official Dagster Helm chart (passed to dependency).
# 2 user code deployments: de-team (dbt-spark + EMR on EKS) and sales-team (dbt-athena).
# Each code location has its own image, service account (IRSA), and resource limits.
# Image repository URLs and IRSA role ARNs are placeholders — populated from Terraform outputs.
# ---------------------------------------------------------------------------------------------------------------------
# 
# -- Official Dagster chart values (passed to dependency)
dagster:
  # ---------------------------------------------------------------------------

  # DAGSTER WEBSERVER

  # ---------------------------------------------------------------------------
  dagsterWebserver:
    replicaCount: 1
    nodeSelector:
      role: workload
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 500m
        memory: 2Gi
  # ---------------------------------------------------------------------------

  # DAGSTER DAEMON

  # ---------------------------------------------------------------------------
  dagsterDaemon:
    replicaCount: 1
    nodeSelector:
      role: workload
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  # ---------------------------------------------------------------------------

  # USER CODE DEPLOYMENTS — 2 code locations (de-team, sales-team)

  # Each entry runs as a separate gRPC server pod with its own image and service account.

  # ---------------------------------------------------------------------------
  dagster-user-deployments:
    enabled: true
    deployments:
      # -------------------------------------------------------------------------

      # DE-TEAM — dbt-spark, submits Spark jobs to EMR on EKS via PipesEMRContainersClient

      # -------------------------------------------------------------------------
      - name: de-team
        image:
          repository: "560503716668.dkr.ecr.ap-southeast-1.amazonaws.com/lakehouse-at-scale/de-team-code"
          tag: "a5888393"
          pullPolicy: Always
        dagsterApiGrpcArgs:
          - "--module-name"
          - "dagster_project.definitions"
        port: 3030
        nodeSelector:
          role: workload
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        env:
          - name: DAGSTER_ENV
            value: "prod"
          - name: AWS_REGION
            value: "ap-southeast-1"
          - name: PYTHONPATH
            value: "/app"
        serviceAccount:
          create: true
          name: dagster-de-team
          annotations:
            eks.amazonaws.com/role-arn: "arn:aws:iam::560503716668:role/lakehouse-at-scale-dagster-de-team-20260502235436821500000001"
      # -------------------------------------------------------------------------
      - name: sales-team
        # -------------------------------------------------------------------------

        # SALES-TEAM — dbt-athena, queries Athena directly (no Spark/EMR)
        image:
          repository: "560503716668.dkr.ecr.ap-southeast-1.amazonaws.com/lakehouse-at-scale/sales-team-code"
          tag: "a5888393"
          pullPolicy: Always
        dagsterApiGrpcArgs:
          - "--module-name"
          - "dagster_project.definitions"
        port: 3030
        nodeSelector:
          role: workload
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        env:
          - name: DAGSTER_ENV
            value: "prod"
          - name: AWS_REGION
            value: "ap-southeast-1"
          - name: PYTHONPATH
            value: "/app"
        serviceAccount:
          create: true
          name: dagster-sales-team
          annotations:
            eks.amazonaws.com/role-arn: "arn:aws:iam::560503716668:role/lakehouse-at-scale-dagster-sales-team-20260502235350188400000001"
