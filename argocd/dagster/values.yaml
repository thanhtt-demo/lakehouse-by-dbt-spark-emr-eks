# ---------------------------------------------------------------------------------------------------------------------
# DAGSTER VALUES
# Configuration for the official Dagster Helm chart (passed to dependency).
# 2 user code deployments: de-team (dbt-spark + EMR on EKS) and sales-team (dbt-athena).
# Each code location has its own image, service account (IRSA), and resource limits.
# Image repository URLs and IRSA role ARNs are placeholders — populated from Terraform outputs.
# ---------------------------------------------------------------------------------------------------------------------
# 
# -- Official Dagster chart values (passed to dependency)
dagster:
  # ---------------------------------------------------------------------------
  # SERVICE ACCOUNT — shared SA for webserver + daemon (needs S3 access for compute logs)
  # ---------------------------------------------------------------------------
  serviceAccount:
    create: true
    name: dagster
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::560503716668:role/lakehouse-at-scale-dagster-de-team-20260607035848292600000001"
  # ---------------------------------------------------------------------------
  # COMPUTE LOG MANAGER — persist stdout/stderr to S3 for viewing in Dagster UI
  # upload_interval = 30 so the stdout/stderr tabs stream every 30 s during a
  # running step instead of only appearing when the step finishes. This is the
  # log channel for the Dagster run pod itself; Spark driver stdio streams via
  # Dagster Pipes into the Events tab (polls ~10-20 s).
  # ---------------------------------------------------------------------------
  computeLogManager:
    type: S3ComputeLogManager
    config:
      s3ComputeLogManager:
        bucket: "lakehouse-at-scale-data-lake"
        prefix: "dagster-compute-logs/"
        region: "ap-southeast-1"
        upload_interval: 30
  # ---------------------------------------------------------------------------

  # DAGSTER WEBSERVER

  # ---------------------------------------------------------------------------
  dagsterWebserver:
    replicaCount: 1
    nodeSelector:
      role: workload
    # Keep the webserver pod pinned to its node — Karpenter's consolidation
    # (WhenEmptyOrUnderutilized) would otherwise drain long-running "lightweight"
    # controllers to pack them onto a smaller cheaper node, which causes the
    # UI to bounce every few minutes.
    annotations:
      karpenter.sh/do-not-disrupt: "true"
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 500m
        memory: 2Gi
  # ---------------------------------------------------------------------------

  # DAGSTER DAEMON

  # ---------------------------------------------------------------------------
  dagsterDaemon:
    replicaCount: 1
    nodeSelector:
      role: workload
    # Same reasoning as webserver — the scheduler/run-coordinator daemon
    # must stay online; being reconsolidated mid-run causes missed ticks.
    annotations:
      karpenter.sh/do-not-disrupt: "true"
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  # ---------------------------------------------------------------------------

  # USER CODE DEPLOYMENTS — 2 code locations (de-team, sales-team)

  # Each entry runs as a separate gRPC server pod with its own image and service account.

  # ---------------------------------------------------------------------------
  dagster-user-deployments:
    enabled: true
    # Shared service account for all user code deployments.
    # Dagster Helm chart does NOT support per-deployment SAs — all deployments share one SA.
    # For demo, this SA has combined permissions (EMR + Athena + Glue + S3).
    # For production, consider separate Dagster installations per team.
    serviceAccount:
      create: true
      name: dagster-user-deployments
      annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::560503716668:role/lakehouse-at-scale-dagster-de-team-20260607035848292600000001"
    deployments:
      # -------------------------------------------------------------------------

      # DE-TEAM — dbt-spark, submits Spark jobs to EMR on EKS via PipesEMRContainersClient

      # -------------------------------------------------------------------------
      - name: de-team
        image:
          repository: "560503716668.dkr.ecr.ap-southeast-1.amazonaws.com/lakehouse-at-scale/de-team-code"
          tag: "758036de"
          pullPolicy: Always
        dagsterApiGrpcArgs:
          - "--module-name"
          - "dagster_project.definitions"
        port: 3030
        nodeSelector:
          role: workload
        # The user-deployment gRPC server must stay online for the webserver
        # + daemon to load code and launch runs; protect it from Karpenter
        # consolidation (same pattern as webserver/daemon).
        annotations:
          karpenter.sh/do-not-disrupt: "true"
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        env:
          - name: DAGSTER_ENV
            value: "prod"
          - name: AWS_REGION
            value: "ap-southeast-1"
          - name: PYTHONPATH
            value: "/app"
          - name: DAGSTER_HOME
            value: "/home/hadoop/dagster_home"
          - name: EMR_VIRTUAL_CLUSTER_ID
            value: "2tdazbgi2kdwg11fq4c9rjn00"
          - name: EMR_EXECUTION_ROLE_ARN
            value: "arn:aws:iam::560503716668:role/lakehouse-at-scale-emr-execution-20260607035810226400000001"
          - name: SPARK_CODE_IMAGE_URI
            value: "560503716668.dkr.ecr.ap-southeast-1.amazonaws.com/lakehouse-at-scale/de-team-code:758036de"
          - name: PIPES_S3_BUCKET
            value: "lakehouse-at-scale-pipes"
          - name: SPARK_S3_LOGS_URI
            value: "s3://lakehouse-at-scale-spark-logs/emr-on-eks/"
          - name: SPARK_CLOUDWATCH_LOG_GROUP
            value: "/emr-on-eks/lakehouse-at-scale"
          # -------------------------------------------------------------------
          # EKS CLIENT MODE (spark_submit_mode = eks_client)
          # When a model runs in eks_client mode, the Dagster step pod IS the Spark
          # driver (client deploy mode) and launches executor pods directly on EKS —
          # no EMR Virtual Cluster, no EMR uplift. These env vars wire that path:
          #   SPARK_K8S_NAMESPACE              namespace executor pods are created in.
          #     MUST equal the namespace the Dagster step pod runs in (dagster), because
          #     Spark looks up the driver pod (spark.kubernetes.driver.pod.name) in this
          #     same namespace to set executor owner refs. Pointing it elsewhere fails with
          #     "No pod was found named dagster-step-... in namespace <x> (driver pod)".
          #   SPARK_EXECUTOR_SERVICE_ACCOUNT   SA executors run as. Reuses the de-team IRSA
          #     SA (S3 + Glue), the same SA the driver step pod uses — one role, one SA.
          #   SPARK_EXECUTOR_POD_TEMPLATE_FILE pod template adding the toleration for the
          #                                    spark-executors (Spot) NodePool taint.
          # Executors still land on the spark-executors Spot nodes via the pod template's
          # nodeSelector/toleration — namespace is independent of node scheduling.
          # The driver↔executor wiring (POD_IP / POD_NAME) is injected by the per-model
          # op_tags (dagster-k8s/config env via the downward API), not here.
          # -------------------------------------------------------------------
          - name: SPARK_K8S_NAMESPACE
            value: "dagster"
          - name: SPARK_EXECUTOR_SERVICE_ACCOUNT
            value: "dagster-user-deployments"
          - name: SPARK_EXECUTOR_POD_TEMPLATE_FILE
            value: "/app/executor-pod-template.yaml"
          - name: DBT_PROJECT_DIR
            value: "/app/dbt_project"
          # Set to "1" (uncomment) to run dbt in debug mode inside the Spark
          # driver — logs every compiled SQL statement + timings to dbt.log and
          # surfaces them as `executed_sql` / `compiled_sql` metadata in Dagster.
          # Leave disabled in prod: the extra payload travels through Pipes S3
          # messages. Compiled + executed SQL is ALWAYS reported regardless of
          # this flag; it only controls the verbose dbt.log stream.
          - name: DBT_DEBUG
            value: "1"
      # -------------------------------------------------------------------------
      - name: sales-team
        # -------------------------------------------------------------------------

        # SALES-TEAM — dbt-athena, queries Athena directly (no Spark/EMR)
        image:
          repository: "560503716668.dkr.ecr.ap-southeast-1.amazonaws.com/lakehouse-at-scale/sales-team-code"
          tag: "cf2f3e9b"
          pullPolicy: Always
        dagsterApiGrpcArgs:
          - "--module-name"
          - "dagster_project.definitions"
        port: 3030
        nodeSelector:
          role: workload
        annotations:
          karpenter.sh/do-not-disrupt: "true"
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        env:
          - name: DAGSTER_ENV
            value: "prod"
          - name: AWS_REGION
            value: "ap-southeast-1"
          - name: PYTHONPATH
            value: "/app"
