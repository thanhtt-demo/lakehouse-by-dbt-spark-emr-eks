# ---------------------------------------------------------------------------------------------------------------------
# SPARK HISTORY SERVER SERVICE
# ClusterIP by default — access via:
#   kubectl -n spark port-forward svc/spark-history-server 18080:18080
# then open http://localhost:18080. The History Server has no auth, so it is not exposed publicly.
# ---------------------------------------------------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: spark-history-server
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spark-history-server
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: dbt-lakehouse
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: spark-history-server
  ports:
    - name: http
      port: {{ .Values.ui.port }}
      targetPort: http
      protocol: TCP
