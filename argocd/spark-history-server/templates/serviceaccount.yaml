{{- if .Values.serviceAccount.create }}
# ---------------------------------------------------------------------------------------------------------------------
# SERVICE ACCOUNT (IRSA)
# Annotated with the shared de-team role ARN so the History Server pod gets read access to the
# spark-logs S3 bucket via the IRSA credential chain (no static keys).
# ---------------------------------------------------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spark-history-server
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: dbt-lakehouse
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.roleArn | quote }}
{{- end }}
