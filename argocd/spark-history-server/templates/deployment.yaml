# ---------------------------------------------------------------------------------------------------------------------
# SPARK HISTORY SERVER DEPLOYMENT
# Runs `spark-class org.apache.spark.deploy.history.HistoryServer` in the foreground (the
# sbin/start-history-server.sh wrapper daemonizes, which does not suit a container PID 1).
# Stateless: all state is the event logs on S3, so a single replica is fine and restarts are safe.
# ---------------------------------------------------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-history-server
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spark-history-server
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: dbt-lakehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spark-history-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spark-history-server
        app.kubernetes.io/part-of: dbt-lakehouse
      annotations:
        # Long-running controller — keep Karpenter from draining it onto another node, which
        # would drop the UI mid-session (same pattern as the Dagster webserver/daemon).
        karpenter.sh/do-not-disrupt: "true"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: spark-history-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - "/bin/sh"
            - "-c"
            # The EMR image accesses S3 through EMRFS (com.amazon.ws.emr.hadoop.fs.EmrFileSystem,
            # AWS SDK v1), wired onto the driver via spark.driver.extraClassPath in
            # /etc/spark/conf/spark-defaults.conf. That mechanism only applies to
            # spark-submit-launched driver/executor JVMs — NOT to the HistoryServer daemon launched
            # directly by spark-class, which builds its classpath from the Spark jars +
            # SPARK_DIST_CLASSPATH only. So we add the EMR S3/Hadoop jars (EMRFS + AWS SDK v1) here.
            #
            # We force fs.s3.impl=EmrFileSystem (in SPARK_HISTORY_OPTS) instead of the default
            # open-source S3A connector: S3A in EMR's Hadoop needs the AWS SDK *v2* bundle, which
            # the EMR image does not ship (it ships SDK v1 for EMRFS) — using S3A fails with
            # NoClassDefFoundError: software.amazon.awssdk... EMRFS is the supported S3 client here.
            # exec so the JVM becomes PID 1 and receives SIGTERM cleanly on pod shutdown.
            - |
              export SPARK_DIST_CLASSPATH="$(/usr/lib/hadoop/bin/hadoop classpath 2>/dev/null):/usr/lib/hadoop/hadoop-aws.jar:/usr/share/aws/aws-java-sdk/*:/usr/share/aws/emr/emrfs/conf:/usr/share/aws/emr/emrfs/lib/*:/usr/share/aws/emr/emrfs/auxlib/*"
              exec ${SPARK_HOME:-/usr/lib/spark}/bin/spark-class org.apache.spark.deploy.history.HistoryServer
          env:
            - name: AWS_REGION
              value: "ap-southeast-1"
            # The HistoryServer reads its config from SPARK_HISTORY_OPTS (-D system properties).
            #   fs.s3.impl                   force EMRFS for s3:// (see classpath note above).
            #   logDirectory                 where to replay event logs from (matches the jobs).
            #   update.interval              S3 rescan cadence; a finished job shows ~15s after it
            #                                ends (running short jobs are not visible here — use
            #                                the driver's port-4040 UI; see docs).
            #   inProgressOptimization       incremental replay of .inprogress logs.
            #   cleaner.*                    bound retention so S3 + replay set stay small.
            - name: SPARK_HISTORY_OPTS
              value: >-
                -Dspark.hadoop.fs.s3.impl=com.amazon.ws.emr.hadoop.fs.EmrFileSystem
                -Dspark.history.fs.logDirectory={{ .Values.eventLog.dir }}
                -Dspark.history.ui.port={{ .Values.ui.port }}
                -Dspark.history.fs.update.interval={{ .Values.eventLog.updateInterval }}
                -Dspark.history.fs.inProgressOptimization.enabled=true
                -Dspark.history.fs.cleaner.enabled={{ .Values.eventLog.cleaner.enabled }}
                -Dspark.history.fs.cleaner.maxAge={{ .Values.eventLog.cleaner.maxAge }}
          ports:
            - name: http
              containerPort: {{ .Values.ui.port }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
