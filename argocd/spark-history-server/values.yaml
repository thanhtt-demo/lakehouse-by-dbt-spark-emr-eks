# ---------------------------------------------------------------------------------------------------------------------
# SPARK HISTORY SERVER VALUES
# serviceAccount.roleArn is populated from Terraform outputs (de-team IRSA role). The image is the
# de-team BASE image (stable, decoupled from code deploys) — see the image block below.
# ---------------------------------------------------------------------------------------------------------------------

# Namespace the History Server runs in. `spark` already exists (created by the EMR Virtual
# Cluster / argocd namespaces app) and is whitelisted on the ArgoCD AppProject.
namespace: spark

image:
  # Use the de-team BASE image (not the Code Image). The History Server only needs Spark +
  # spark-class + EMRFS + the DataFlint JAR — all of which live in the base image — NOT the dbt /
  # dagster project code. Critically, the base image:
  #   - is rebuilt only when dependencies change (NOT on every code push), and
  #   - is NOT touched by the CI `update-argocd` job (which only bumps the Code Image tag in
  #     argocd/dagster/values.yaml),
  # so the SHS image is decoupled from code deploys — rebuilding the de-team Code Image does NOT
  # auto-change this version. `latest` only moves when you intentionally rebuild the base image.
  repository: "560503716668.dkr.ecr.ap-southeast-1.amazonaws.com/lakehouse-at-scale/de-team-base"
  tag: "latest"
  pullPolicy: Always

serviceAccount:
  create: true
  name: spark-history-server
  # De-team IRSA role (shared) — read-only on the spark-logs bucket is enough to replay logs.
  # The role trust policy must list spark:spark-history-server (see dagster-irsa/de-team-role).
  roleArn: "arn:aws:iam::560503716668:role/lakehouse-at-scale-dagster-de-team-20260607035848292600000001"

# Event log location the History Server replays. Must match spark.eventLog.dir set on the jobs
# (DEFAULT_SPARK_PROPERTIES in dagster_project/utils/spark_config.py).
eventLog:
  dir: "s3://lakehouse-at-scale-spark-logs/spark-events/"
  # How often the server rescans S3 for new/updated logs. Lower = fresher running-job view,
  # higher = fewer S3 LIST calls. 15s gives the ~15-30s freshness requested.
  updateInterval: "15s"
  # Reap event logs older than this so S3 (and the server's replay set) stays bounded.
  cleaner:
    enabled: true
    maxAge: "7d"

ui:
  port: 18080

resources:
  requests:
    cpu: 250m
    memory: 1Gi
  limits:
    cpu: 500m
    memory: 2Gi

# Pin to the long-running workload NodePool and shield from Karpenter consolidation, same as the
# Dagster webserver/daemon — otherwise the UI bounces when the node is reclaimed.
nodeSelector:
  role: workload

# ---------------------------------------------------------------------------------------------------------------------
# SERVICE EXPOSURE
# Default ClusterIP: reach the UI via `kubectl -n spark port-forward svc/spark-history-server
# 18080:18080`. The Spark History Server has NO built-in authentication, so it is intentionally
# NOT exposed publicly. Switch type to LoadBalancer / add an authenticated Ingress only behind
# proper access control.
# ---------------------------------------------------------------------------------------------------------------------
service:
  type: ClusterIP
