# ---------------------------------------------------------------------------------------------------------------------
# DBT PROJECT CONFIGURATION — de-team (dbt-spark + Iceberg)
# Lakehouse platform: dbt models execute on Spark via EMR on EKS, writing Iceberg tables to S3.
# Glue Data Catalog serves as the metastore.
# ---------------------------------------------------------------------------------------------------------------------

name: "de_team_lakehouse"
version: "1.0.0"

config-version: 2

profile: "de_team_lakehouse"

# ---------------------------------------------------------------------------------------------------------------------
# VARS
# spark_submit_mode — project-wide default Spark execution backend (the on/off toggle):
#   eks_client     : dbt runs in-process in the Dagster step pod, which acts as the Spark driver
#                    in client mode on EKS. No EMR uplift cost. (default)
#   emr_containers : submit each model to the EMR on EKS Virtual Cluster (managed runtime).
# Override per-model via meta.spark_config.mode in a model's schema.yml.
# ---------------------------------------------------------------------------------------------------------------------

vars:
  spark_submit_mode: "eks_client"

# ---------------------------------------------------------------------------------------------------------------------
# MODEL PATHS
# ---------------------------------------------------------------------------------------------------------------------

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ---------------------------------------------------------------------------------------------------------------------
# DEFAULT MATERIALIZATIONS
# Default: table with Iceberg file format.
# Incremental models use merge strategy for Iceberg ACID upserts.
# ---------------------------------------------------------------------------------------------------------------------

models:
  de_team_lakehouse:
    +materialized: table
    +file_format: iceberg
    +incremental_strategy: merge

    staging:
      +schema: staging

    intermediate:
      +schema: intermediate

    marts:
      +schema: marts
