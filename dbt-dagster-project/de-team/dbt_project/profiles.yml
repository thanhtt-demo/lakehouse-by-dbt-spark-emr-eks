# ---------------------------------------------------------------------------------------------------------------------
# DBT PROFILES — de-team (dbt-spark adapter)
# Uses method: session — connects directly to the active SparkSession in the same Python process
# on the Spark Driver Pod (EMR on EKS). No Thrift server needed.
# ---------------------------------------------------------------------------------------------------------------------

de_team_lakehouse:
  target: prod
  outputs:
    prod:
      type: spark
      method: session
      schema: staging
    # CI target — used by dagster-dbt prepare-and-package in GitHub Actions.
    # dbt parse requires a valid profile but never connects to Spark.
    # Uses method: http to avoid pyspark dependency in CI.
    ci:
      type: spark
      method: http
      host: localhost
      port: 10000
      schema: staging
