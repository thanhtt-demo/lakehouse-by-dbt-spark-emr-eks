# ---------------------------------------------------------------------------------------------------------------------
# STAGING MODEL: stg_raw_orders
# Source-conformed orders — minimal transformation (rename/cast), 1:1 with raw.raw_orders.
# Lightweight workload: runs in-cluster (eks_client) with small Spark resources.
# ---------------------------------------------------------------------------------------------------------------------

version: 2

models:
  - name: stg_raw_orders
    description: "Synthetic orders with a skewed customer_id (data-skew demo) — generated in-model, no external seed"
    config:
      materialized: table
      file_format: iceberg
    meta:
      spark_config:
        mode: "eks_client"
        driver_cpu: "1"
        driver_memory: "2g"
        executor_cpu: "1"
        executor_memory: "2g"
        executor_instances: 2
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Customer who placed the order"
        tests:
          - not_null
      - name: order_date
        description: "Date the order was placed"
      - name: status
        description: "Current order status"
      - name: amount
        description: "Order total amount"
      - name: currency
        description: "Currency code"
      - name: updated_at
        description: "Timestamp of last update"
      - name: etl_at
        description: "ETL load timestamp in Vietnam time (Asia/Ho_Chi_Minh) — for data lineage / tracing"
