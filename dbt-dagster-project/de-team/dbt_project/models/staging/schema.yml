# ---------------------------------------------------------------------------------------------------------------------
# STAGING SCHEMA CONFIGURATION
# Maps to Glue Data Catalog database: staging
# Source-conformed models — minimal transformations, 1:1 with source tables.
# ---------------------------------------------------------------------------------------------------------------------

version: 2

sources:
  - name: raw
    description: "Raw data source tables in Glue Data Catalog"
    schema: raw
    tables:
      - name: raw_orders
        description: "Raw orders table ingested from upstream systems"
        meta:
          dagster_group: external_source
        columns:
          - name: order_id
            description: "Unique identifier for each order"
          - name: customer_id
            description: "Customer who placed the order"
          - name: order_date
            description: "Date the order was placed"
          - name: status
            description: "Current order status (pending, completed, cancelled)"
          - name: amount
            description: "Order total amount"
          - name: currency
            description: "Currency code (e.g. USD, VND)"
          - name: updated_at
            description: "Timestamp of last update to this record"
      - name: raw_customers
        description: "Raw customers table ingested from CRM system"
        meta:
          dagster_group: external_source
        columns:
          - name: customer_id
            description: "Unique identifier for each customer"
          - name: customer_name
            description: "Full name of the customer"
          - name: email
            description: "Customer email address"
          - name: region
            description: "Customer region (e.g. APAC, EMEA, NA)"
          - name: created_at
            description: "Timestamp when customer was first created"
          - name: updated_at
            description: "Timestamp of last update to this record"

models:
  - name: stg_raw_orders
    description: "Staged orders — source-conformed with column renaming and type casting"
    config:
      materialized: table
      file_format: iceberg
    meta:
      # Lightweight source-conformed model — runs in-cluster (eks_client), small resources.
      spark_config:
        mode: "eks_client"
        driver_cpu: "1"
        driver_memory: "2g"
        executor_cpu: "1"
        executor_memory: "2g"
        executor_instances: 1
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Customer who placed the order"
        tests:
          - not_null
      - name: order_date
        description: "Date the order was placed"
      - name: status
        description: "Current order status"
      - name: amount
        description: "Order total amount"
      - name: currency
        description: "Currency code"
      - name: updated_at
        description: "Timestamp of last update"

  - name: stg_raw_customers
    description: "Staged customers — source-conformed with column renaming and type casting"
    config:
      materialized: table
      file_format: iceberg
    meta:
      # Lightweight source-conformed model — runs in-cluster (eks_client), small resources.
      spark_config:
        mode: "eks_client"
        driver_cpu: "1"
        driver_memory: "2g"
        executor_cpu: "1"
        executor_memory: "2g"
        executor_instances: 1
    columns:
      - name: customer_id
        description: "Unique identifier for each customer"
        tests:
          - not_null
          - unique
      - name: customer_name
        description: "Full name of the customer"
        tests:
          - not_null
      - name: email
        description: "Customer email address"
      - name: region
        description: "Customer region"
      - name: created_at
        description: "Timestamp when customer was first created"
      - name: updated_at
        description: "Timestamp of last update"
