# ---------------------------------------------------------------------------------------------------------------------
# MARTS MODEL: orders  (DATA-SKEW DEMO)
# Customer-level aggregation of stg_raw_orders (GROUP BY customer_id). The upstream data is skewed
# onto one hot customer_id, so this shuffle is heavily imbalanced — the scenario we want DataFlint
# to detect. Full-table rebuild (not incremental) and AQE disabled so the skew is NOT auto-fixed.
# ---------------------------------------------------------------------------------------------------------------------

version: 2

models:
  - name: orders
    description: "Customer-level order aggregates (data-skew demo) — GROUP BY a skewed customer_id"
    config:
      materialized: table
      file_format: iceberg
    meta:
      spark_config:
        # Heavier resources + several executors so the skew is visible: one reduce task churns
        # ~95% of the rows while the others finish almost immediately (long-tail task).
        mode: "eks_client"
        driver_cpu: "1"
        driver_memory: "2g"
        executor_cpu: "1"
        executor_memory: "2g"
        executor_instances: 2
        spark_properties:
          # Disable Adaptive Query Execution so Spark does NOT coalesce/rebalance the skewed
          # shuffle partitions. Without this, AQE could mask the skew and DataFlint would have
          # nothing to flag. Remove this to demo AQE auto-mitigation instead.
          spark.sql.adaptive.enabled: "false"
    columns:
      - name: customer_id
        description: "Customer the orders are aggregated by (the skewed key)"
        tests:
          - not_null
          - unique
      - name: order_count
        description: "Number of orders for the customer"
      - name: total_amount
        description: "Sum of order amounts for the customer"
      - name: avg_amount
        description: "Average order amount for the customer"
      - name: first_order_date
        description: "Earliest order date for the customer"
      - name: last_order_date
        description: "Latest order date for the customer"
      - name: dbt_updated_at
        description: "Timestamp when dbt last processed this record"
      - name: etl_at
        description: "ETL load timestamp in Vietnam time (Asia/Ho_Chi_Minh) — for data lineage / tracing"
