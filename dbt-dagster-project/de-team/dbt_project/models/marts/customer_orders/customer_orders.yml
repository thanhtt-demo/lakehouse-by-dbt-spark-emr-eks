# ---------------------------------------------------------------------------------------------------------------------
# MARTS MODEL: customer_orders
# Business-facing table joining orders with customer details for enriched reporting.
# ---------------------------------------------------------------------------------------------------------------------

version: 2

models:
  - name: customer_orders
    description: "Business-facing table joining orders with customer details — enriched with customer name and region"
    config:
      materialized: table
      file_format: iceberg
    meta:
      # Join model (orders x customers) — moderate size, runs in-cluster (eks_client).
      spark_config:
        mode: "eks_client"
        driver_cpu: "1"
        driver_memory: "2g"
        executor_cpu: "1"
        executor_memory: "4g"
        executor_instances: 2
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Customer who placed the order"
        tests:
          - not_null
      - name: customer_name
        description: "Full name of the customer"
      - name: customer_email
        description: "Customer email address"
      - name: customer_region
        description: "Customer region (e.g. APAC, EMEA, NA)"
      - name: order_date
        description: "Date the order was placed"
      - name: status
        description: "Current order status (pending, completed, cancelled)"
      - name: amount
        description: "Order total amount"
      - name: currency
        description: "Currency code"
      - name: updated_at
        description: "Timestamp of last update from source"
